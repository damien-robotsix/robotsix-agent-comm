name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target for the manual dry-run."
        type: choice
        default: testpypi
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # Thin call to the shared reusable: build + publish to PyPI via
  # Trusted Publishing (OIDC).  Only runs on tag pushes;
  # workflow_dispatch dry-runs go through the dedicated
  # publish-testpypi job below.
  #
  # We set github-release=false because the reusable's bare
  # softprops/action-gh-release step does not extract changelog
  # notes — we create the GitHub Release ourselves in the
  # github-release job below.
  # ------------------------------------------------------------------
  # environment for OIDC trusted publishing is declared inside the reusable python-release.yml; it cannot be set on a reusable-calling job
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-release.yml@5cd8c1facb02299da618979e7a55f1953f9c075a  # main
    with:
      python-version: "3.12"
      github-release: false

  # ------------------------------------------------------------------
  # Agent-comm-specific: validate the built artifacts with twine.
  # Runs after the reusable completes (post-publish verification
  # because the reusable does not support interposing a validation
  # step between its build and publish jobs).
  # ------------------------------------------------------------------
  twine-check:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: python-package-distributions
          path: dist/
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
      - run: uv run --frozen --with twine twine check dist/*

  # ------------------------------------------------------------------
  # Agent-comm-specific: extract the CHANGELOG section for this
  # version and create the GitHub Release with the distribution
  # artifacts attached.
  # ------------------------------------------------------------------
  github-release:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: python-package-distributions
          path: dist/
      - name: Extract changelog notes for this release
        run: |
          version="${GITHUB_REF_NAME#v}"
          python3 - "$version" <<'PY' > release-notes.md
          import pathlib
          import re
          import sys

          version = sys.argv[1]
          changelog = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = re.compile(
              r"^## \[" + re.escape(version) + r"\].*?\n(.*?)(?=^## |\Z)",
              re.DOTALL | re.MULTILINE,
          )
          match = pattern.search(changelog)
          if not match:
              sys.exit(f"No changelog section found for version {version}")
          print(match.group(1).strip())
          PY
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            dist/*

  # ------------------------------------------------------------------
  # Agent-comm-specific: dry-run publish to TestPyPI (manual
  # trigger only).  The reusable workflow does not support
  # TestPyPI (no repository-url input), so this job keeps the
  # full inline build+validate+publish sequence.
  # ------------------------------------------------------------------
  publish-testpypi:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: testpypi
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
      - name: Build sdist and wheel
        run: uv build
      - name: Validate artifacts
        run: uv run --frozen --with twine twine check dist/*
      - name: Check if version already exists on TestPyPI
        id: check-testpypi
        run: |
          VERSION=$(python3 -c "import pathlib; w=sorted(pathlib.Path('dist').glob('*.whl')); print(w[0].name.split('-')[1])")
          PACKAGE="robotsix-agent-comm"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://test.pypi.org/pypi/${PACKAGE}/${VERSION}/json")
          echo "http_code=${HTTP_CODE}" >> "$GITHUB_OUTPUT"
          if [ "${HTTP_CODE}" = "200" ]; then
            echo "Version ${VERSION} of ${PACKAGE} already exists on TestPyPI — skipping publish"
            echo "skip_publish=true" >> "$GITHUB_OUTPUT"
          elif [ "${HTTP_CODE}" = "404" ]; then
            echo "Version ${VERSION} of ${PACKAGE} not found on TestPyPI — will publish"
            echo "skip_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Unexpected HTTP ${HTTP_CODE} from TestPyPI API — proceeding with publish"
            echo "skip_publish=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to TestPyPI (Trusted Publishing)
        if: steps.check-testpypi.outputs.skip_publish != 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
