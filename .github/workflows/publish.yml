name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target for the manual dry-run."
        type: choice
        default: testpypi
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # Agent-comm-specific: verify that a pushed tag matches the
  # [project].version single-source-of-truth in pyproject.toml.
  # Runs before the reusable workflow so a mismatch fails fast
  # without consuming a build slot.
  # ------------------------------------------------------------------
  verify-tag:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5.4.2
      - name: Verify tag matches project version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          project_version="$(uv run --frozen python -c 'import tomllib, pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          echo "Tag version:     ${tag_version}"
          echo "Project version: ${project_version}"
          if [ "${tag_version}" != "${project_version}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match [project].version (${project_version})"
            exit 1
          fi

  # ------------------------------------------------------------------
  # Thin call to the shared reusable: build + publish to PyPI via
  # Trusted Publishing (OIDC).  Only runs on tag pushes;
  # workflow_dispatch dry-runs go through the dedicated
  # publish-testpypi job below.
  #
  # We set github-release=false because the reusable's bare
  # softprops/action-gh-release step does not extract changelog
  # notes — we create the GitHub Release ourselves in the
  # github-release job below.
  # ------------------------------------------------------------------
  release:
    needs: verify-tag
    if: |
      always() &&
      (needs.verify-tag.result == 'success' || needs.verify-tag.result == 'skipped') &&
      startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    environment: pypi
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-release.yml@90fcbcb32974e45c86e798f6da435e430e276a99  # main
    with:
      python-version: "3.12"
      github-release: false

  # ------------------------------------------------------------------
  # Agent-comm-specific: validate the built artifacts with twine.
  # Runs after the reusable completes (post-publish verification
  # because the reusable does not support interposing a validation
  # step between its build and publish jobs).
  # ------------------------------------------------------------------
  twine-check:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: python-package-distributions
          path: dist/
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5.4.2
      - run: uv run --frozen --with twine twine check dist/*

  # ------------------------------------------------------------------
  # Agent-comm-specific: extract the CHANGELOG section for this
  # version and create the GitHub Release with the distribution
  # artifacts attached.
  # ------------------------------------------------------------------
  github-release:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: python-package-distributions
          path: dist/
      - name: Extract changelog notes for this release
        run: |
          version="${GITHUB_REF_NAME#v}"
          python3 - "$version" <<'PY' > release-notes.md
          import pathlib
          import re
          import sys

          version = sys.argv[1]
          changelog = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = re.compile(
              r"^## \[" + re.escape(version) + r"\].*?\n(.*?)(?=^## |\Z)",
              re.DOTALL | re.MULTILINE,
          )
          match = pattern.search(changelog)
          if not match:
              sys.exit(f"No changelog section found for version {version}")
          print(match.group(1).strip())
          PY
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            dist/*

  # ------------------------------------------------------------------
  # Agent-comm-specific: dry-run publish to TestPyPI (manual
  # trigger only).  The reusable workflow does not support
  # TestPyPI (no repository-url input), so this job keeps the
  # full inline build+validate+publish sequence.
  # ------------------------------------------------------------------
  publish-testpypi:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: testpypi
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5.4.2
      - name: Verify tag matches project version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          project_version="$(uv run --frozen python -c 'import tomllib, pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          if [ "${tag_version}" != "${project_version}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match [project].version (${project_version})"
            exit 1
          fi
      - name: Build sdist and wheel
        run: uv build
      - name: Validate artifacts
        run: uv run --frozen --with twine twine check dist/*
      - name: Publish to TestPyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
