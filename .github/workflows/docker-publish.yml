name: Docker image

# Publishes the broker container image (Dockerfile -> robotsix-broker) to GHCR:
#   - push to `main`  -> moving `main` tag (Watchtower's continuous-deploy target)
#   - push of a `v*` tag -> semver tags (`1.2.3`, `1.2`, `1`)
# Every build also gets a `sha-<short>` tag. The production broker on the server
# runs this image and is auto-updated by Watchtower from the `main` tag.
on:
  push:
    branches: ['main']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write        # required for provenance/SBOM attestation signing
  attestations: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      # The default `docker` driver cannot emit provenance/SBOM attestations;
      # setup-buildx-action provisions the `docker-container` driver, which can.
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max   # SLSA build provenance
          sbom: true             # CycloneDX/SPDX SBOM attestation
