name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly scan to catch newly-disclosed vulnerabilities even without commits.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@6b0550b4a2a7c00e939e5501b0c0b3f654b3d8e4  # v3.29.2
        with:
          languages: python
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@6b0550b4a2a7c00e939e5501b0c0b3f654b3d8e4  # v3.29.2
