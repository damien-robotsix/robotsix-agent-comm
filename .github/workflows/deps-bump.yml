name: Deps Bump

on:
  schedule:
    - cron: "0 6 * * 1"   # every Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deps-bump:
    uses: damien-robotsix/robotsix-mill/.github/workflows/deps-bump.yml@90fcbcb32974e45c86e798f6da435e430e276a99  # main
    permissions:
      contents: write
      pull-requests: write
    secrets:
      DEPS_BUMP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
