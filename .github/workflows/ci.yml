name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    permissions:
      contents: read
      security-events: write
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-ci.yml@main
    with:
      python-version: ${{ matrix.python-version }}
      install-extras: ""
      cov-package: "robotsix_agent_comm"
      coverage-threshold: "85"
      mypy-advisory: false

  lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v5
      - run: uv lock --check

  vulture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v5
      - run: uv run vulture src/ vulture_whitelist.py

  # The reusable python-ci workflow type-checks src/ only; this gate extends
  # strict mypy to the whole tree (tests included) so test-only type errors
  # cannot accumulate unnoticed.
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v5
      - run: uv run mypy .

  security:
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-security.yml@main
    with:
      install-extras: ""
      trufflehog-pr-diff: true
      trufflehog-extra-args: "--results=verified,unknown"
