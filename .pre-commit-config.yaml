repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-toml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/hukkin/mdformat
    rev: "1.0.0"
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-mkdocs
        args: [--number]
        exclude: "^templates/|\\.pytest_cache/"

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: [-r, src]
        exclude: ^tests/

  - repo: https://github.com/gitleaks/gitleaks
    rev: 83d9cd684c87d95d656c1458ef04895a7f1cbd8e  # v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy .
        language: system
        pass_filenames: false
      - id: vulture
        name: vulture
        entry: vulture src/ vulture_whitelist.py
        language: system
        pass_filenames: false
      - id: deptry
        name: deptry
        entry: uv run deptry .
        language: system
        pass_filenames: false
