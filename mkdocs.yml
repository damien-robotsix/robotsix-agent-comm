site_name: robotsix-agent-comm
site_description: Agent communication system for the robotsix ecosystem

theme:
  name: material

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]

nav:
  - Home: index.md
  - Design: design/index.md
  - API reference: api/index.md
  - Tutorials: tutorials/index.md
  - Decisions:
      - 1. Stdlib-first, minimal dependencies: decisions/0001-stdlib-first.md
      - 2. Transport architecture: decisions/0002-transport-architecture.md
      - 3. Addressing and routing: decisions/0003-addressing-and-routing.md
      - 4. Delivery semantics: decisions/0004-delivery-semantics.md
      - 5. HTTP+JSON transport: decisions/0005-http-json-transport.md
